# Starship prompt configuration
# https://starship.rs/config/

# Two-line prompt with clean input line
format = """
$directory\
$git_branch\
$git_status\
$fill\
$python\
$bun\
$nodejs\
$cmd_duration\
$line_break\
$character"""

# Blank line between prompts
add_newline = true

[directory]
truncation_length = 4
truncation_symbol = "…/"
truncate_to_repo = true
repo_root_style = "bold blue"

[git_branch]
format = "[$symbol$branch(:$remote_branch)]($style) "

[git_status]
format = '([$all_status$ahead_behind]($style) )'
stashed = "≡"

[python]
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'

[bun]
format = "[$symbol($version)]($style) "

[nodejs]
format = "[$symbol($version)]($style) "
detect_extensions = []

[cmd_duration]
min_time = 3_000

[character]
success_symbol = "[❯](green)"
error_symbol = "[❯](red)"

[fill]
symbol = " "
