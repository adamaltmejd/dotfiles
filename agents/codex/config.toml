model = "gpt-5.4"
model_reasoning_effort = "xhigh"
personality = "pragmatic"
sandbox_mode = "workspace-write"
service_tier = "fast"

[features]
apps = true
multi_agent = true
prevent_idle_sleep = true
shell_snapshot = true
steer = true
unified_exec = true

[sandbox_workspace_write]
writable_roots = ["/Users/adam/.cache/R/renv"]
network_access = true          # Opt in to outbound network

[shell_environment_policy]
inherit = "all"

[shell_environment_policy.set]
RENV_WATCHDOG_ENABLED = "FALSE"

[projects."/Users/adam/Code/sun2000_coding"]
